<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Paradise</title>
    <style>
        body {
            background: linear-gradient(45deg, #3c1414, #522626);
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(60, 20, 20, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #d4a017;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .video-container {
            background-color: #2a1010;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .video-link {
            color: #d4a017;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .video-link:hover {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍫 Chocolate Paradise 🍫</h1>
        <p>Welcome to our chocolate-themed page! Here you can discover amazing content about chocolate.</p>
        <div class="video-container">
            <p>Check out this great video about chocolate: </p>
            <p>Content about chocolate will be added here...</p>
        </div>
    </div>
</body>
</html>
